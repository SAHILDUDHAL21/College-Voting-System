<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Candidate | Voting Portal</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js"></script>
    <script src="config.js"></script>
</head>
<body>

<div class="layout-container">
    <aside class="sidebar">
        <div class="brand">
            <div class="brand-icon"><i class="fa-solid fa-check-to-slot"></i></div>
            <div class="brand-text">
                <h2>Voting Portal</h2>
                <p>Teacher Portal</p>
            </div>
        </div>
        
        <nav class="nav-links">
            <a href="teacher_dashboard.html" class="nav-item"><i class="fa-solid fa-house"></i> Dashboard</a>
            <a href="teacher_profile.html" class="nav-item"><i class="fa-solid fa-user"></i> Profile</a>
            <a href="add_candidate.html" class="nav-item active"><i class="fa-solid fa-user-plus"></i> Add Candidate</a>
            <a href="result.html" class="nav-item"><i class="fa-solid fa-chart-line"></i> View Results</a>
        </nav>

        <a href="#" onclick="localStorage.clear(); window.location.href='login.html';" class="nav-item logout-btn"><i class="fa-solid fa-sign-out-alt"></i> Logout</a>
    </aside>

    <main class="main-content">
        <header class="page-header">
            <h1>Add New Candidate</h1>
            <p>Register a student to run for an active election.</p>
        </header>

        <div class="card" style="max-width: 800px;">
            <form id="candidateForm">
                <div style="display: flex; gap: 32px; align-items: flex-start; margin-bottom: 24px;">
                    <div style="flex-shrink: 0; text-align: center;">
                        <div id="photoPreview" style="width: 120px; height: 120px; border-radius: 50%; background: #f1f5f9; border: 2px dashed var(--border); display: flex; align-items: center; justify-content: center; overflow: hidden; margin-bottom: 12px; cursor: pointer;" onclick="document.getElementById('candidatePhoto').click()">
                            <img id="previewImg" src="" style="width: 100%; height: 100%; object-fit: cover; display: none;">
                            <i class="fa-solid fa-camera" id="previewIcon" style="font-size: 24px; color: var(--text-sub);"></i>
                        </div>
                        <input type="file" id="candidatePhoto" accept="image/png, image/jpeg" style="display: none;">
                        <p style="font-size: 12px; color: var(--text-sub); font-weight: 500;">Upload Photo</p>
                    </div>

                    <div style="flex: 1;">
                        <div class="form-group">
                            <label>Full Name *</label>
                            <input type="text" id="candidateName" class="form-control" placeholder="Candidate's full name" required>
                        </div>
                        
                        <div class="form-group">
                            <label>Assign to Election *</label>
                            <select id="electionSelect" class="form-control" required>
                                <option value="">Loading Active Elections...</option>
                            </select>
                        </div>
                    </div>
                </div>

                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                    <div class="form-group">
                        <label>Department *</label>
                        <select id="candidateDepartment" class="form-control" required>
                            <option value="">Select Department</option>
                            <option>Computer Science</option>
                            <option>Business</option>
                            <option>Engineering</option>
                            <option>Arts</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Class *</label>
                        <select id="candidateClass" class="form-control" required>
                            <option value="">Select Class</option>
                            <option>First Year</option>
                            <option>Second Year</option>
                            <option>Third Year</option>
                            <option>Final Year</option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label>Manifesto / Description</label>
                    <textarea id="candidateDesc" class="form-control" style="height: 120px; resize: none;" placeholder="Briefly describe the candidate's agenda or profile..."></textarea>
                </div>

                <div style="display: flex; gap: 16px; margin-top: 32px; padding-top: 24px; border-top: 1px solid var(--border);">
                    <button type="submit" class="btn btn-dark" style="padding: 12px 32px;">Save & Publish Candidate</button>
                    <button type="button" class="btn btn-white" style="border: 1px solid var(--border); padding: 12px 32px;" onclick="window.location.href='teacher_dashboard.html'">Cancel</button>
                </div>
            </form>
        </div>
    </main>
</div>

<script>
    checkAuth('teacher');
    let base64Photo = "";

    window.onload = async function() {
        try {
            const res = await fetch(BASE_URL + "/api/elections");
            const elections = await res.json();
            
            const select = document.getElementById("electionSelect");
            select.innerHTML = '<option value="">Select an Active Election</option>';
            
            elections.forEach(e => {
                if (e.status === 'Active') {
                    const opt = document.createElement("option");
                    opt.value = e.id;
                    opt.innerText = e.name;
                    select.appendChild(opt);
                }
            });
            if (select.options.length === 1) {
                select.innerHTML = '<option value="">No active elections found to assign</option>';
            }
        } catch (err) {
            console.error("Failed to load elections");
        }
    }

    document.getElementById('candidatePhoto').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = function(event) {
                base64Photo = event.target.result;
                document.getElementById('previewImg').src = base64Photo;
                document.getElementById('previewImg').style.display = 'block';
                document.getElementById('previewIcon').style.display = 'none';
            };
            reader.readAsDataURL(file);
        }
    });

    document.getElementById("candidateForm").addEventListener("submit", async function(e){
        e.preventDefault();
        
        const name = document.getElementById("candidateName").value;
        const className = document.getElementById("candidateClass").value;
        const department = document.getElementById("candidateDepartment").value;
        const description = document.getElementById("candidateDesc").value;
        const electionId = document.getElementById("electionSelect").value;
        
        if (!electionId) {
            alert("Please select an election to assign the candidate to.");
            return;
        }

        const payload = {
            name,
            className,
            profilePhoto: base64Photo,
            department,
            description,
            electionId
        };

        try {
            const response = await fetch(BASE_URL + "/api/candidates", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(payload)
            });

            if (response.ok) {
                alert("Candidate registered successfully!");
                document.getElementById("candidateForm").reset();
                document.getElementById('previewImg').src = "";
                document.getElementById('previewImg').style.display = 'none';
                document.getElementById('previewIcon').style.display = 'block';
                base64Photo = "";
            } else {
                alert("Failed to add candidate. Please try again.");
            }
        } catch (err) {
            alert("Server connection failed.");
        }
    });
</script>

</body>
</html>
