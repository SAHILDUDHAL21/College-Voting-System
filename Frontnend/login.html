<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Voting Portal</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js"></script>
    <script src="config.js"></script>
</head>
<body class="auth-container">

<video autoplay muted loop playsinline class="bg-video">
    <source src="video/168572-839370257_medium.mp4" type="video/mp4">
</video>
<div class="video-overlay"></div>

<div class="auth-card card">
    <div class="auth-logo">
        <div class="brand-icon" style="margin: 0 auto 16px;">
            <i class="fa-solid fa-check-to-slot"></i>
        </div>
        <h2 style="font-size: 24px; font-weight: 700;">Welcome Back</h2>
        <p style="color: var(--text-sub); font-size: 14px; margin-top: 4px;">Sign in to your account</p>
    </div>

    <form id="loginForm">
        <div class="form-group">
            <label>Select Role *</label>
            <select id="role" class="form-control" required>
                <option value="">Choose your role</option>
                <option value="student">Student</option>
                <option value="teacher">Teacher</option>
                <option value="admin">Admin</option>
            </select>
        </div>

        <div class="form-group">
            <label>Email / College ID *</label>
            <input type="text" id="email" class="form-control" placeholder="Enter your email or id" required>
        </div>

        <div class="form-group">
            <label>Password *</label>
            <input type="password" id="password" class="form-control" placeholder="••••••••" required>
        </div>

        <div id="errorMsg" class="badge" style="display: none; background: #fee2e2; color: #b91c1c; width: 100%; text-align: center; margin-bottom: 16px;"></div>

        <button type="submit" class="btn btn-dark" style="width: 100%;">Login</button>

        <p style="text-align: center; font-size: 14px; margin-top: 24px; color: var(--text-sub);">
            Don't have an account? <a href="register.html" style="color: var(--primary-blue); font-weight: 600; text-decoration: none;">Register here</a>
        </p>
    </form>
</div>

<script>
const form = document.getElementById("loginForm");
const errorMsg = document.getElementById("errorMsg");

form.addEventListener("submit", async function(e) {
    e.preventDefault();

    const role = document.getElementById("role").value;
    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value.trim();

    try {
        const response = await fetch(BASE_URL + "/api/users/login", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ role: role, emailOrId: email, password: password })
        });

        const result = await response.json();

        if (!response.ok) {
            errorMsg.style.display = "block";
            errorMsg.innerText = result.message || "Invalid credentials!";
            return;
        }

        errorMsg.style.display = "none";
        
        // Save user info
        localStorage.setItem("userId", result.id);
        localStorage.setItem("userRole", result.role);
        localStorage.setItem("userFullName", result.fullname);
        localStorage.setItem("userEmail", result.email);

        if(result.role === "admin") {
            window.location.href = "admin_dashboard.html";
        } else if(result.role === "student") {
            window.location.href = "student_dashboard.html";
        } else if(result.role === "teacher") {
            window.location.href = "teacher_dashboard.html"; 
        }
    } catch (err) {
        errorMsg.style.display = "block";
        errorMsg.innerText = "Server not reachable!";
    }
});
</script>

</body>
</html>
